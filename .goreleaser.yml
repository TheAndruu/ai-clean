version: 2

project_name: ai-clean

before:
  hooks:
    - go mod tidy

builds:
  - id: ai-clean
    binary: ai-clean
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - completions/*

release:
  replace_existing_artifacts: true

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: ai-clean
    repository:
      owner: TheAndruu
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/TheAndruu/ai-clean"
    description: "Clean clipboard text from AI CLI tools"
    license: "MIT"
    install: |
      bin.install "ai-clean"
      bash_completion.install "completions/ai-clean.bash" => "ai-clean"
      zsh_completion.install "completions/ai-clean.zsh" => "_ai-clean"
      fish_completion.install "completions/ai-clean.fish"
    test: |
      assert_match version.to_s, shell_output("#{bin}/ai-clean --version")
